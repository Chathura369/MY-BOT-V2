openapi: 3.1.0
info:
  title: Api
  version: 0.1.0
  description: WhatsApp Bot API specification
servers:
  - url: /bot-api
    description: Bot API path
tags:
  - name: auth
    description: Authentication
  - name: stats
    description: Bot statistics
  - name: sessions
    description: WhatsApp sessions management
  - name: broadcast
    description: Broadcast messages
  - name: users
    description: User management
  - name: commands
    description: Bot commands
  - name: settings
    description: Bot settings
  - name: logs
    description: Bot logs
paths:
  /auth/login:
    post:
      operationId: login
      tags: [auth]
      summary: Admin login
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginRequest"
      responses:
        "200":
          description: Login successful
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LoginResponse"
        "401":
          description: Invalid credentials

  /stats:
    get:
      operationId: getStats
      tags: [stats]
      summary: Get bot statistics
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Stats
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BotStats"

  /sessions:
    get:
      operationId: listSessions
      tags: [sessions]
      summary: List all sessions
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Sessions list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Session"
    post:
      operationId: createSession
      tags: [sessions]
      summary: Create a new session
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateSessionRequest"
      responses:
        "200":
          description: Session created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Session"

  /sessions/{id}:
    delete:
      operationId: deleteSession
      tags: [sessions]
      summary: Delete a session
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OkResponse"

  /sessions/{id}/paircode:
    post:
      operationId: requestPairCode
      tags: [sessions]
      summary: Request pairing code for a session
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                phone:
                  type: string
              required:
                - phone
      responses:
        "200":
          description: Pair code sent
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:
                    type: boolean
                  code:
                    type: string
                required:
                  - ok
                  - code

  /sessions/{id}/qr:
    get:
      operationId: getSessionQR
      tags: [sessions]
      summary: Get QR code for a session
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: QR data
          content:
            application/json:
              schema:
                type: object
                properties:
                  qrCode:
                    type: string
                required:
                  - qrCode

  /sessions/{id}/disconnect:
    post:
      operationId: disconnectSession
      tags: [sessions]
      summary: Disconnect a session
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Disconnected
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OkResponse"

  /broadcast:
    post:
      operationId: sendBroadcast
      tags: [broadcast]
      summary: Send broadcast message
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/BroadcastRequest"
      responses:
        "200":
          description: Broadcast sent
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OkResponse"
    get:
      operationId: getBroadcastHistory
      tags: [broadcast]
      summary: Get broadcast history
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Broadcast history
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/BroadcastRecord"

  /users:
    get:
      operationId: listUsers
      tags: [users]
      summary: List all users
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Users list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/BotUser"

  /users/{jid}:
    delete:
      operationId: deleteUser
      tags: [users]
      summary: Delete a user
      security:
        - bearerAuth: []
      parameters:
        - name: jid
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OkResponse"

  /users/{jid}/premium:
    post:
      operationId: toggleUserPremium
      tags: [users]
      summary: Toggle premium status for a user
      security:
        - bearerAuth: []
      parameters:
        - name: jid
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OkResponse"

  /users/{jid}/ban:
    post:
      operationId: toggleUserBan
      tags: [users]
      summary: Toggle ban status for a user
      security:
        - bearerAuth: []
      parameters:
        - name: jid
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OkResponse"

  /commands:
    get:
      operationId: listCommands
      tags: [commands]
      summary: List all bot commands
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Commands list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/BotCommand"

  /settings:
    get:
      operationId: getSettings
      tags: [settings]
      summary: Get bot settings
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Settings
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BotSettings"
    post:
      operationId: updateSettings
      tags: [settings]
      summary: Update bot settings
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/BotSettings"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OkResponse"

  /admin/restart:
    post:
      operationId: restartBot
      tags: [settings]
      summary: Restart the bot
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Restarting
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OkResponse"

  /logs:
    get:
      operationId: getLogs
      tags: [logs]
      summary: Get bot logs
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Logs
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/LogEntry"

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  schemas:
    LoginRequest:
      type: object
      properties:
        username:
          type: string
        password:
          type: string
      required:
        - username
        - password

    LoginResponse:
      type: object
      properties:
        token:
          type: string
        username:
          type: string
      required:
        - token
        - username

    OkResponse:
      type: object
      properties:
        ok:
          type: boolean
        message:
          type: string

    BotStats:
      type: object
      properties:
        status:
          type: string
        connectedNumber:
          type: string
          nullable: true
        connectedAt:
          type: string
          nullable: true
        uptime:
          type: number
        memUsed:
          type: number
        memTotal:
          type: number
        memPercent:
          type: number
        cpuLoad:
          type: number
        userCount:
          type: number
        sessionCount:
          type: number
        broadcastCount:
          type: number
        fileCount:
          type: number
        fileSize:
          type: number
        netSpeedRx:
          type: number
        netSpeedTx:
          type: number
        netTotalRx:
          type: number
        netTotalTx:
          type: number
      required:
        - status
        - uptime
        - memUsed
        - memTotal
        - memPercent
        - cpuLoad
        - userCount
        - sessionCount
        - broadcastCount
        - fileCount
        - fileSize
        - netSpeedRx
        - netSpeedTx
        - netTotalRx
        - netTotalTx

    Session:
      type: object
      properties:
        id:
          type: string
        label:
          type: string
        isMain:
          type: boolean
        number:
          type: string
          nullable: true
        status:
          type: string
        startedAt:
          type: string
          nullable: true
        qrAvailable:
          type: boolean
        pairCode:
          type: string
          nullable: true
      required:
        - id
        - status

    CreateSessionRequest:
      type: object
      properties:
        id:
          type: string
        pairMode:
          type: boolean
        phone:
          type: string
      required:
        - id

    BroadcastRequest:
      type: object
      properties:
        message:
          type: string
        targets:
          type: array
          items:
            type: string
        sessionId:
          type: string
      required:
        - message
        - targets

    BroadcastRecord:
      type: object
      properties:
        id:
          type: string
        message:
          type: string
        targets:
          type: array
          items:
            type: string
        sentAt:
          type: string
        status:
          type: string
      required:
        - id
        - message
        - sentAt
        - status

    BotUser:
      type: object
      properties:
        jid:
          type: string
        name:
          type: string
        premium:
          type: boolean
        banned:
          type: boolean
        coins:
          type: number
        xp:
          type: number
        level:
          type: number
        joinedAt:
          type: string
      required:
        - jid
        - premium
        - banned

    BotCommand:
      type: object
      properties:
        name:
          type: string
        aliases:
          type: array
          items:
            type: string
        description:
          type: string
        category:
          type: string
      required:
        - name
        - category

    BotSettings:
      type: object
      properties:
        prefix:
          type: string
        autoRead:
          type: boolean
        autoTyping:
          type: boolean
        nsfwEnabled:
          type: boolean
        premiumCode:
          type: string
        adminUser:
          type: string

    LogEntry:
      type: object
      properties:
        time:
          type: string
        message:
          type: string
        level:
          type: string
      required:
        - time
        - message
